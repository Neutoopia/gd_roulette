name: Sync GD Levels

on:
  schedule:
    - cron: "0 4 * * *"  # daily at 4am UTC
  workflow_dispatch:       # lets you trigger it manually from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -X GET "${{ secrets.APP_URL }}/api/sync-levels" \
            -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}" \
            --fail \
            --silent \
            --show-error